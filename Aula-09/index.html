<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-09</title>
</head>
<body>
     <h1> <center> Formulario </center> </h1>

<form>
  <table border="1
">

    <tr>
      <td>Nome:</td>
      <td><input type="text" placeholder="Digite seu nome"></td>
    </tr>

    <tr>
      <td>E-mail pessoal:</td>
      <td><input type="email"></td>
    </tr>

    <tr>
      <td>E-mail (pattern):</td>
      <td><input type="email" pattern=".+@.+" placeholder="Digite seu email com @"></td>
    </tr>

    <tr>
      <td>Senha:</td>
      <td><input type="password"></td>
    </tr>

    <tr>
      <td>Idade:</td>
      <td><input type="number"></td>
    </tr>

    <tr>
      <td>Deixe um comentário:</td>
      <td><textarea></textarea></td>
    </tr>

    <tr>
      <td>Matéria de interesse:</td>
      <td>
        <input type="checkbox"> Backend<br>
        <input type="checkbox"> FrontEnd<br>
        <input type="checkbox"> FullStack
      </td>
    </tr>

    <tr>
      <td>Tipo de Viagem:</td>
      <td>
        <input type="radio" name="viagem"> Negócios<br>
        <input type="radio" name="viagem"> Lazer<br>
        <input type="radio" name="viagem"> Turismo<br>
        <input type="radio" name="viagem"> Acadêmico
      </td>
    </tr>

    <tr>
      <td>Esporte favorito:</td>
      <td>
        <select multiple>
          <option>Futebol</option>
          <option>Basquete</option>
          <option>Vôlei</option>
          <option>Tênis</option>
        </select>
      </td>
    </tr>

    <tr>
      <td>Investimentos:</td>
      <td>
        <select>
          <optgroup label="Poupança">
            <option>CDB</option>
            <option>Tesouro Direto</option>
          </optgroup>
          <optgroup label="Fundos Imobiliários">
            <option>CDI</option>
            <option>Debêntures</option>
          </optgroup>
          <optgroup label="Criptomoedas">
            <option>Ações</option>
          </optgroup>
        </select>
      </td>
    </tr>

    <tr>
      <td>Selecione um arquivo:</td>
      <td><input type="file"></td>
    </tr>

    <tr>
      <td>Escolha uma cor:</td>
      <td><input type="color"></td>
    </tr>

    <tr>
      <td>Data e Hora envio:</td>
      <td><input type="datetime-local"></td>
    </tr>

    <tr>
      <td colspan="2" class="botoes">
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
      </td>
    </tr>

  </table>
  </form>
</body>
</html>
